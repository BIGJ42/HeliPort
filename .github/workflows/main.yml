name: CI

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:

  CI:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: build/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Install Dependencies
      run: |
        brew install create-dmg swiftlint
        python -m pip install pycountry
      env:
        HOMEBREW_NO_INSTALL_CLEANUP: 1
        HOMEBREW_NO_AUTO_UPDATE: 1

    - name: Manage Version
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      run: |
        git fetch --prune --unshallow --tags
        GIT_SHA="$(git rev-parse --short HEAD)"
        CUR_TAG="$(git tag -l | grep -i 'alpha' | tail -1)"
        eval $(grep -m 1 "MARKETING_VERSION =" HeliPort.xcodeproj/project.pbxproj | tr -d ';' | tr -d '\t' | tr -d " ")

        if [[ "$GITHUB_EVENT_NAME" != 'workflow_dispatch' ]]; then
          sed -i '' -e "s/CURRENT_PROJECT_VERSION =.*/CURRENT_PROJECT_VERSION = \"$(MARKETING_VERSION)-alpha-${GIT_SHA}\";/g" HeliPort.xcodeproj/project.pbxproj
        else
          sed -i '' -e "s/CURRENT_PROJECT_VERSION =.*/CURRENT_PROJECT_VERSION = \"$(MARKETING_VERSION)-stable-${GIT_SHA}\";/g" HeliPort.xcodeproj/project.pbxproj
        fi

        echo "VER=$MARKETING_VERSION" >> $GITHUB_ENV
        echo "SHORT_SHA=$GIT_SHA" >> $GITHUB_ENV
        if [[ -z $CUR_TAG ]]; then
          echo "OLD_PRE_TAG=NULL" >> $GITHUB_ENV
        else
          echo "OLD_PRE_TAG=$CUR_TAG" >> $GITHUB_ENV
        fi
      shell: zsh {0}

    - name: Lint
      run: swiftlint lint --reporter github-actions-logging

    - name: i18n Stats
      run: |
        import os, sys, json
        from pycountry import languages
        from collections import defaultdict

        def get_lang_name(code):
            if '-' in code:
                code = code.split('-')[0]
            lang = languages.get(alpha_2=code)
            return lang.name if lang else code

        def write_stats(file_path):
            with open(file_path, 'r', encoding='utf-8') as file:
                data = json.load(file)

            if data["version"] != "1.0":
                raise ValueError(f"Unsupported version: {data['version']}")

            strings = data["strings"]
            localizations = defaultdict(int)

            for string in strings.values():
                if "localizations" in string:
                    for lang_code in string["localizations"].keys():
                        localizations[lang_code] += 1

            summary = ["## i18n Stats", "",
                      "| Language | Code | Completion |",
                      "| :-- | :-- | --: |"]

            for lang_code, count in localizations.items():
                summary.append(f"| {get_lang_name(lang_code)} | {lang_code} | {(count / len(strings) * 100):.2f}% |")

            summary.extend(["",
                            f"- **Total Languages**: {len(localizations)}",
                            f"- **Total Strings**: {len(strings)}"])

            with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                f.write('\n'.join(summary) + '\n')

        try:
            write_stats("HeliPort/Appearance/Localizable.xcstrings")
        except Exception as e:
            print(f"::error::{str(e)}")
            sys.exit(1)

      shell: python

    - name: Debug Build
      if: github.event_name != 'workflow_dispatch'
      run: |
        set -o pipefail && xcodebuild ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO -scheme HeliPort -configuration Debug -derivedDataPath build -disableAutomaticPackageResolution CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES | xcbeautify --renderer terminal

    - name: Release Build
      run: |
        set -o pipefail && xcodebuild ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO -scheme HeliPort -configuration Release -derivedDataPath build -disableAutomaticPackageResolution CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES | xcbeautify

    - name: Create Disk Image
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      run: |
        XCBUILD_PATH="build/Build/Products/Release"
        cp LICENSE $XCBUILD_PATH
        cd $XCBUILD_PATH
        curl -sLO https://openintelwireless.github.io/HeliPort/dmg/VolumeIcon.icns
        curl -sLO https://openintelwireless.github.io/HeliPort/dmg/dmg-background.tiff
        create-dmg \
          --volname "HeliPort" \
          --volicon "VolumeIcon.icns" \
          --background "dmg-background.tiff" \
          --window-pos 200 120 \
          --window-size 660 420 \
          --text-size 12 \
          --eula "LICENSE" \
          --icon-size 160 \
          --icon "HeliPort.app" 180 170 \
          --hide-extension "HeliPort.app" \
          --app-drop-link 480 170 \
          "HeliPort.dmg" \
          "./HeliPort.app"
        cd -
        mkdir Artifacts
        cp -R ${XCBUILD_PATH}/*.dmg Artifacts

    - name: Setup Prerelease Variables
      if: github.event_name == 'push' && github.ref_name == 'master'
      run: |
        echo "REL_TAG=v${VER}-alpha" >> $GITHUB_ENV
        echo "IS_PRE=true" >> $GITHUB_ENV

        echo '### Disclaimer:' >> ReleaseNotes.md
        echo '***This alpha version is for testing only.***' >> ReleaseNotes.md
        echo 'It is not ready for daily use.' >> ReleaseNotes.md
        echo 'Please report issues at https://github.com/bigj42/heliport/issues' >> ReleaseNotes.md

    - name: Setup Release Variables
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "REL_TAG=v${VER}" >> $GITHUB_ENV
        echo "IS_PRE=false" >> $GITHUB_ENV

    - name: Generate Release Notes
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      run: |
        echo '### The latest updates are:' >> ReleaseNotes.md
        LAST_STABLE="$(git tag -l | grep -v 'alpha' | sort -V | tail -1)"
        if [[ -z "$LAST_STABLE" ]]; then
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          RANGE="HEAD"
        else
          COMMIT_COUNT="$(git rev-list --count ${LAST_STABLE}..HEAD)"
          RANGE="${LAST_STABLE}..HEAD"
        fi
        if [[ $COMMIT_COUNT -gt 0 ]]; then
          git log -"${COMMIT_COUNT}" "${RANGE}" --format="- %H %s" | grep -v '.git\|Merge\|yml\|CI' | sed  '/^$/d' >> ReleaseNotes.md
        else
          echo "- No new changes" >> ReleaseNotes.md
        fi
      shell: bash

    - name: Delete Old Prerelease
      if: ((github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch') && env.OLD_PRE_TAG != 'NULL'
      run: gh release delete ${{ env.OLD_PRE_TAG }} --cleanup-tag
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate Sparkle Appcast
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      run: |
        REPO_BASE='https://github.com/bigj42/heliport'
        REPO_COMMIT_URL="${REPO_BASE}/commit/"
        INDENT='                    '
        
        # Build changelog HTML from commits since last stable tag
        LAST_STABLE="$(git tag -l | grep -v 'alpha' | sort -V | tail -1)"
        if [[ -z "$LAST_STABLE" ]]; then
          COMMIT_COUNT="$(git rev-list --count HEAD)"
        else
          COMMIT_COUNT="$(git rev-list --count ${LAST_STABLE}..HEAD)"
        fi
        
        # Escape XML characters in git log
        CHANGELOG=""
        if [[ $COMMIT_COUNT -gt 0 ]]; then
          while read -r sha short_sha subject; do
            esc_subject=$(echo "$subject" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g; s/'"'"'/\&apos;/g')
            CHANGELOG+="${INDENT}<li><a class=\"commit-link\" href=\"${REPO_COMMIT_URL}${sha}\"><tt>${short_sha}</tt></a> ${esc_subject}</li>\n"
          done <<< "$(git log -"${COMMIT_COUNT}" --format="%H %h %s")"
        else
          CHANGELOG="${INDENT}<li>No new changes</li>\n"
        fi

        SPARKLE_BIN='./build/SourcePackages/artifacts/sparkle/Sparkle/bin'
        if [[ ! -f "$SPARKLE_BIN/sign_update" ]]; then
          echo "::error::sign_update not found at $SPARKLE_BIN/sign_update"
          exit 1
        fi

        PUBDATE="$(date +"%a, %d %b %Y %T %z")"
        DMG_URL="${REPO_BASE}/releases/download/${REL_TAG}/HeliPort.dmg"
        SPARKLE_SHORT="${VER}"
        SPARKLE_BUILD="${VER}-${SHORT_SHA}"

        SIGN_RESULT=""
        if [[ -n "${SPARKLE_KEY}" ]]; then
          # Pass key via temporary file to avoid deprecation warnings and signing errors
          echo "${SPARKLE_KEY}" > sparkle_private_key.txt
          # sign_update outputs: sparkle:edSignature="..." length="..."
          RAW_SIGN_RESULT="$($SPARKLE_BIN/sign_update --ed-key-file sparkle_private_key.txt ./Artifacts/HeliPort.dmg)"
          SIGN_STATUS=$?
          rm sparkle_private_key.txt
          
          if [[ $SIGN_STATUS -ne 0 ]]; then
            echo "::error::sign_update failed with exit code $SIGN_STATUS"
            echo "Output: $RAW_SIGN_RESULT"
            exit 1
          fi
          
          # Trim whitespace using sed instead of xargs to preserve quotes
          SIGN_RESULT=$(echo "$RAW_SIGN_RESULT" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          echo "Generated signature attributes: $SIGN_RESULT"
        fi

        cat <<EOF > ./Artifacts/appcast.xml
        <?xml version="1.0" standalone="yes"?>
        <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
                <title>HeliPort</title>
                <item>
                    <title>${VER}</title>
                    <pubDate>${PUBDATE}</pubDate>
                    <description><![CDATA[
                        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Primer/19.4.0/primer.min.css"><meta charset="UTF-8">
                        <div class="markdown-body">
                            <h3>The latest updates are:</h3>
                            <ul>
        $(echo -e "${CHANGELOG}")
                            </ul>
                        </div>
                    ]]></description>
                    <sparkle:minimumSystemVersion>11.0</sparkle:minimumSystemVersion>
                    <enclosure url="${DMG_URL}" sparkle:version="${SPARKLE_BUILD}" sparkle:shortVersionString="${SPARKLE_SHORT}" type="application/octet-stream" ${SIGN_RESULT}/>
                </item>
            </channel>
        </rss>
        EOF
        echo "Generated appcast.xml for version ${SPARKLE_SHORT} (${SPARKLE_BUILD})"
        cat ./Artifacts/appcast.xml
      shell: bash
      env:
        SPARKLE_KEY: ${{ secrets.SPARKLE_KEY }}

    - name: Deploy Appcast to Master
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      run: |
        cp ./Artifacts/appcast.xml ./appcast.xml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add appcast.xml
        git commit -m "chore: update appcast.xml [skip ci]" || echo "No changes to commit"
        git push origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish GitHub Release
      if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        replacesArtifacts: true
        prerelease: ${{ env.IS_PRE }}
        bodyFile: ReleaseNotes.md
        artifacts: "./Artifacts/*"
        tag: ${{ env.REL_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
